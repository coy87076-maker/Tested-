<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGP ATM Machine</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 16px;
}

.atm-wrap {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Header card ── */
.atm-header {
  background: #1565c0;
  border-radius: 14px;
  padding: 24px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.atm-header-left h1 {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .3px;
}

.atm-header-left p {
  font-size: 13px;
  color: rgba(255,255,255,.7);
  margin-top: 2px;
}

.balance-pill {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 999px;
  padding: 8px 20px;
  text-align: center;
}

.balance-pill .bal-label {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
  letter-spacing: .8px;
}

.balance-pill .bal-amount {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-top: 1px;
  font-variant-numeric: tabular-nums;
}

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e4e7ec;
  padding: 22px 24px;
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.card-title svg { flex-shrink: 0; }

/* ── Inputs ── */
.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 14px;
}

.field label {
  font-size: 13px;
  font-weight: 600;
  color: #374151;
}

.field input {
  width: 100%;
  padding: 10px 14px;
  font-size: 15px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #f9fafb;
  color: #111827;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

.field input:focus {
  border-color: #1565c0;
  box-shadow: 0 0 0 3px rgba(21,101,192,.12);
  background: #fff;
}

/* Name row */
.name-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.name-row .field { flex: 1; margin-bottom: 0; }

/* ── Buttons ── */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}

.btn:hover { opacity: .88; }
.btn:active { transform: scale(.97); }

.btn-save  { background: #1565c0; color: #fff; }
.btn-check { background: #f1f5fe; color: #1565c0; border: 1px solid #b8d0f5; }
.btn-dep   { background: #2e7d32; color: #fff; }
.btn-wd    { background: #c62828; color: #fff; }

.actions-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.actions-row .btn { flex: 1; min-width: 110px; padding: 12px 16px; font-size: 15px; }

/* ── Message box ── */
.msg-box {
  padding: 12px 16px;
  background: #f0f5ff;
  border-left: 4px solid #1565c0;
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  font-weight: 500;
  color: #1e3a6e;
  margin-top: 14px;
  transition: background .2s;
}

.msg-box.success { background: #f0fdf4; border-color: #2e7d32; color: #1a4d1f; }
.msg-box.error   { background: #fff5f5; border-color: #c62828; color: #7f1d1d; }

/* ── Account badge ── */
.account-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: #f1f5fe;
  border: 1px solid #b8d0f5;
  border-radius: 999px;
  padding: 5px 14px 5px 8px;
  font-size: 13px;
  color: #1e3a6e;
  font-weight: 600;
  margin-top: 12px;
}

.account-badge .avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #1565c0;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ── Table ── */
.table-wrap { overflow-x: auto; margin-top: 4px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 540px;
}

thead tr {
  background: #1565c0;
}

thead th {
  color: #fff;
  font-weight: 600;
  padding: 10px 12px;
  text-align: center;
  letter-spacing: .3px;
}

tbody tr {
  border-bottom: 1px solid #f1f3f5;
  transition: background .1s;
}

tbody tr:hover { background: #f8faff; }

tbody td {
  padding: 9px 12px;
  text-align: center;
  color: #374151;
}

.tx-dep  { color: #2e7d32; font-weight: 600; }
.tx-wd   { color: #c62828; font-weight: 600; }
.tx-bal  { color: #1565c0; font-weight: 600; }

.empty-row td {
  padding: 24px;
  color: #9ca3af;
  font-style: italic;
}
</style>
</head>
<body>

<div class="atm-wrap">

  <!-- Header -->
  <div class="atm-header">
    <div class="atm-header-left">
      <h1>ATM Machine</h1>
      <p>Secure banking terminal</p>
    </div>
    <div class="balance-pill">
      <div class="bal-label">Current Balance</div>
      <div class="bal-amount" id="balance">₱0.00</div>
    </div>
  </div>

  <!-- Account setup -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Account holder
    </div>
    <div class="name-row">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="e.g. Juan dela Cruz">
      </div>
      <button class="btn btn-save" onclick="saveName()">Save</button>
    </div>
    <div class="account-badge" id="accountBadge">
      <div class="avatar" id="avatarInitials">—</div>
      <span id="displayName">No account holder set</span>
    </div>
  </div>

  <!-- Transaction -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Transaction
    </div>
    <div class="field">
      <label for="amount">Amount (₱)</label>
      <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="actions-row">
      <button class="btn btn-check" onclick="checkBalance()">Check Balance</button>
      <button class="btn btn-dep"   onclick="deposit()">Deposit</button>
      <button class="btn btn-wd"    onclick="withdraw()">Withdraw</button>
    </div>
    <div class="msg-box" id="message">Welcome! Please choose a transaction.</div>
  </div>

  <!-- Audit log -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Transaction history
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Date &amp; Time</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr class="empty-row"><td colspan="6">No transactions yet</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let balance = 0;
let transactionLog = [];
let accountHolder = "";

function saveName() {
  const val = document.getElementById("name").value.trim();
  if (!val) { showMessage("Please enter a valid name.", "error"); return; }
  accountHolder = val;
  document.getElementById("displayName").textContent = accountHolder;
  const initials = accountHolder.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase();
  document.getElementById("avatarInitials").textContent = initials;
  document.getElementById("name").value = "";
  showMessage(`Account holder set to: ${accountHolder}`, "success");
}

function checkBalance() {
  showMessage(`Current balance is ₱${balance.toFixed(2)}`, "");
  addLog("Balance inquiry", 0);
}

function deposit() {
  const amt = parseFloat(document.getElementById("amount").value);
  if (isNaN(amt) || amt <= 0) { showMessage("Enter a valid deposit amount.", "error"); return; }
  balance += amt;
  updateBalance();
  showMessage(`Deposited ₱${amt.toFixed(2)} successfully.`, "success");
  addLog("Deposit", amt);
  document.getElementById("amount").value = "";
}

function withdraw() {
  const amt = parseFloat(document.getElementById("amount").value);
  if (isNaN(amt) || amt <= 0) { showMessage("Enter a valid withdrawal amount.", "error"); return; }
  if (amt > balance) { showMessage("Insufficient funds.", "error"); return; }
  balance -= amt;
  updateBalance();
  showMessage(`Withdrew ₱${amt.toFixed(2)} successfully.`, "success");
  addLog("Withdraw", amt);
  document.getElementById("amount").value = "";
}

function updateBalance() {
  document.getElementById("balance").textContent = `₱${balance.toFixed(2)}`;
}

function showMessage(msg, type) {
  const el = document.getElementById("message");
  el.textContent = msg;
  el.className = "msg-box" + (type ? " " + type : "");
}

function addLog(type, amt) {
  transactionLog.push({
    name: accountHolder || "—",
    datetime: new Date().toLocaleString(),
    type,
    amount: amt,
    balance
  });
  renderLog();
}

function renderLog() {
  const tbody = document.getElementById("logBody");
  tbody.innerHTML = transactionLog.slice().reverse().map((item, i) => {
    const cls = item.type === "Deposit" ? "tx-dep" : item.type === "Withdraw" ? "tx-wd" : "tx-bal";
    const amtStr = item.amount > 0 ? `₱${item.amount.toFixed(2)}` : "—";
    return `<tr>
      <td>${transactionLog.length - i}</td>
      <td>${item.name}</td>
      <td>${item.datetime}</td>
      <td class="${cls}">${item.type}</td>
      <td>${amtStr}</td>
      <td>₱${item.balance.toFixed(2)}</td>
    </tr>`;
  }).join("");
}
</script>

</body>
</html>
