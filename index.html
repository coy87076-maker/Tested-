<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Machine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #222;
        }
        .account-info {
            background-color: #eef;
            padding: 10px;
            border: 1px dashed #666;
            margin-bottom: 20px;
        }
        .buttons {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .status-msg {
            font-style: italic;
            color: #555;
            margin: 15px 0;
            padding: 5px;
            border-left: 3px solid #007BFF;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
        }
        .setup-section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>ATM Machine</h1>

    <div class="setup-section" id="setupArea">
        <label for="nameInput">Enter Account Holder Name: </label>
        <input type="text" id="nameInput" placeholder="e.g. John Doe">
        <button onclick="setAccountName()">Submit</button>
    </div>

    <div class="account-info">
        <div><strong>Account Holder:</strong> <span id="displayName"><i>Not set</i></span></div>
        <div><strong>Balance:</strong> ₱0.00</div>
    </div>

    <div class="buttons">
        <button onclick="alert('Checking balance...')">Check Balance</button>
        <button onclick="alert('Deposit dynamic functionality here')">Deposit</button>
        <button onclick="alert('Withdraw dynamic functionality here')">Withdraw</button>
    </div>

    <div class="status-msg">
        Welcome! Please choose a transaction.
    </div>

    <h3>Transaction Summary (Audit Log)</h3>
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Date & Time</th>
                <th>Transaction</th>
                <th>Amount</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" style="text-align: center; color: #888;">No transactions yet</td>
            </tr>
        </tbody>
    </table>

    <script>
        function setAccountName() {
            var inputName = document.getElementById('nameInput').value;
            if (inputName.trim() !== "") {
                document.getElementById('displayName').innerText = inputName;
            } else {
                alert("Please enter a valid name.");
            }
        }
    </script>

</body>
</html>
