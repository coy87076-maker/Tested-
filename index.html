<!DOCTYPE html>
<html lang="en">
<head>

<title>EGP ATM Machine </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f5f9;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
}

.atm-container{
    width:700px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#0d47a1;
}

#balance{
    font-size:22px;
    font-weight:bold;
    text-align:center;
    color:#2e7d32;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

button{
   padding: 12px 28px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;

    /* Creates the slanted sides */
    transform: skew(-20deg);
}

button:hover{
    opacity:.9;
}

.buttons button:nth-child(1){
    background:#1565c0;
}

.buttons button:nth-child(2){
    background:#2e7d32;
}

.buttons button:nth-child(3){
    background:#c62828;
}

#message{
    margin-top:20px;
    padding:12px;
    background:#f4f4f4;
    border-left:5px solid #1565c0;
    border-radius:5px;
    font-weight:bold;
}

hr{
    margin:25px 0;
}

h3{
    margin-bottom:10px;
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

table th{
    background:#1565c0;
    color:white;
    padding:10px;
}

table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

table tbody tr:nth-child(even){
    background:#f7f7f7;
}
</style>

</head>
<body>

<div class="atm-container">

<h2> ATM Machine</h2>

<p id="balance">Balance: ₱0.00</p>

<input
type="string"
id="name"
placeholder="Enter Name">
  <input type="text" id="name" placeholder="Enter Account Holder Name">
    <button onclick="saveName()">Save Name</button>

    <p><strong>Account Holder:</strong> <span id="displayName">None</span></p>

<input
type="number"
id="amount"
placeholder="Enter Amount">


<div class="buttons">
<button onclick="checkBalance()">Check Balance</button>
<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
</div>

<div id="message">
Welcome! Please choose a transaction.
</div>

<hr>

<h3>Transaction Summary (Audit Log)</h3>

<table id="logTable">
<thead>
<tr>
<th>No.</th>
<th>Name</th>
<th>Date & Time</th>
<th>Transaction</th>
<th>Amount</th>
<th>Balance</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>

<script>

let balance = 0;

let transactionLog = [];

/* CHECK BALANCE */

function checkBalance(){

    showMessage(`Your current balance is ₱${balance.toFixed(2)}`);

    addTransaction("Balance Inquiry",0);

}

/* DEPOSIT */

function deposit(){

    let amount = getAmount();

    if(isNaN(amount) || amount<=0){

        showMessage("Please enter a valid deposit amount.");

        return;
    }

    balance += amount;

    updateBalance();

    showMessage(`Successfully deposited ₱${amount.toFixed(2)}.`);

    addTransaction("Deposit",amount);

    clearInput();

}

/* WITHDRAW */

function withdraw(){

    let amount = getAmount();

    if(isNaN(amount) || amount<=0){

        showMessage("Please enter a valid withdrawal amount.");

        return;

    }

    if(amount>balance){

        showMessage("Insufficient funds.");

        return;

    }

    balance -= amount;

    updateBalance();

    showMessage(`Successfully withdrew ₱${amount.toFixed(2)}.`);

    addTransaction("Withdraw",amount);

    clearInput();

}

/* INPUT*/

function getAmount(){

    return parseFloat(document.getElementById("amount").value);

}

function getName(){

    return parseFloat(document.getElementById("name").value);

}
/* UPDATE BALANCE DISPLAY */

function updateBalance(){

    document.getElementById("balance").innerHTML=
    `Balance: ₱${balance.toFixed(2)}`;

}

/* SHOW MESSAGE */

function showMessage(message){

    document.getElementById("message").innerHTML=message;

}

/* CLEAR INPUT */

function clearInput(){

    document.getElementById("amount").value="";

}

/* ADD TRANSACTION */

function addTransaction(type,amount){

    transactionLog.push({

        datetime:new Date().toLocaleString(),

        transaction:type,

        amount:amount,

        balance:balance

    });

    updateLogTable();

}

/* UPDATE TABLE */ 

function updateLogTable(){

    let tbody=document.querySelector("#logTable tbody");

    tbody.innerHTML="";

    transactionLog.forEach(function(item,index){

        tbody.innerHTML+=`

        <tr>

            <td>${index+1}</td>

            <td>${item.name}</td>

            <td>${item.datetime}</td>

            <td>${item.transaction}</td>

            <td>₱${item.amount.toFixed(2)}</td>

            <td>₱${item.balance.toFixed(2)}</td>

        </tr>

        `;

    });

}

</script>

</body>
</html>
