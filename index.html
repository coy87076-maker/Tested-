<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Machine</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:350px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 0 8px gray;
        }

        input{
            width:90%;
            padding:8px;
            margin:8px 0;
        }

        button{
            padding:10px 15px;
            margin:5px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        table, th, td{
            border:1px solid black;
        }

        th, td{
            padding:6px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>ATM Machine</h2>

    <!-- New Feature -->
    <input type="text" id="name" placeholder="Enter Account Holder Name">
    <button onclick="saveName()">Save Name</button>

    <p><strong>Account Holder:</strong> <span id="displayName">None</span></p>

    <h3>Balance: ₱<span id="balance">0.00</span></h3>

    <button>Check Balance</button>
    <button>Deposit</button>
    <button>Withdraw</button>

    <p>Welcome! Please choose a transaction.</p>

    <h3>Transaction Summary (Audit Log)</h3>

    <table>
        <tr>
            <th>No.</th>
            <th>Date & Time</th>
            <th>Transaction</th>
            <th>Amount</th>
            <th>Balance</th>
        </tr>
        <tr>
            <td colspan="5">No transactions yet.</td>
        </tr>
    </table>

</div>

<script>
function saveName() {
    let name = document.getElementById("name").value;

    if(name.trim() === ""){
        alert("Please enter the account holder's name.");
        return;
    }

    document.getElementById("displayName").textContent = name;
}
</script>

</body>
</html>
